name: CD Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (commit SHA or tag)"
        required: true
        type: string

concurrency:
  group: cd-prod
  cancel-in-progress: false

env:
  REGION: asia-northeast1
  GAR_REPO: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/daru-pdf
  DEPLOY_SHA: ${{ github.event.inputs.ref || github.sha }}

jobs:
  # -------------------------------------------------------------------
  # Validate ref is on main (prevent deploying unreviewed code)
  # -------------------------------------------------------------------
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Validate ref is ancestor of main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ env.DEPLOY_SHA }} origin/main; then
            echo "ERROR: ref ${{ env.DEPLOY_SHA }} is not on the main branch"
            exit 1
          fi
          echo "Ref validated: ${{ env.DEPLOY_SHA }} is on main"

  # -------------------------------------------------------------------
  # CI checks (run all before deploying to prod)
  # -------------------------------------------------------------------
  check-api:
    needs: validate-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api
      - name: Lint
        run: python -m ruff check .
        working-directory: apps/api
      - name: Type check
        run: python -m mypy .
        working-directory: apps/api
      - name: Test
        run: python -m pytest
        working-directory: apps/api

  check-web:
    needs: validate-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: actions/setup-node@49933ea5288caeca8642195f882660b323c62e98 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Lint
        run: npm run lint
        working-directory: apps/web
      - name: Type check
        run: npm run typecheck
        working-directory: apps/web
      - name: Build
        run: npm run build
        working-directory: apps/web

  terraform-plan:
    needs: validate-ref
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.5"
      - uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/gcp/terraform
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/prod"
        working-directory: infra/gcp/terraform
      - name: Terraform validate
        run: terraform validate
        working-directory: infra/gcp/terraform
      - name: Terraform plan
        run: terraform plan -var-file=envs/prod.tfvars -no-color
        working-directory: infra/gcp/terraform

  # -------------------------------------------------------------------
  # Build and push Docker images (after CI passes)
  # -------------------------------------------------------------------
  build-push:
    needs: [check-api, check-web, terraform-plan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, orchestrator, rule-service]
        include:
          - service: api
            context: apps/api
          - service: web
            context: apps/web
          - service: orchestrator
            context: apps/orchestrator
          - service: rule-service
            context: apps/rule-service
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c816612b # v6.18.0
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.GAR_REPO }}/${{ matrix.service }}:${{ env.DEPLOY_SHA }}
            ${{ env.GAR_REPO }}/${{ matrix.service }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # Deploy to production (requires manual approval via GitHub Environment)
  # -------------------------------------------------------------------
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.5"
      - uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/prod"
        working-directory: infra/gcp/terraform
      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var-file=envs/prod.tfvars \
            -var="api_image=${{ env.GAR_REPO }}/api:${{ env.DEPLOY_SHA }}" \
            -var="web_image=${{ env.GAR_REPO }}/web:${{ env.DEPLOY_SHA }}" \
            -var="orchestrator_image=${{ env.GAR_REPO }}/orchestrator:${{ env.DEPLOY_SHA }}" \
            -var="rule_service_image=${{ env.GAR_REPO }}/rule-service:${{ env.DEPLOY_SHA }}"
        working-directory: infra/gcp/terraform
