name: CD Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (commit SHA or tag)"
        required: true
        type: string

concurrency:
  group: cd-prod
  cancel-in-progress: false

env:
  REGION: asia-northeast1
  GAR_REPO: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/daru-pdf
  DEPLOY_SHA: ${{ github.event.inputs.ref || github.sha }}

jobs:
  # -------------------------------------------------------------------
  # CI checks (run all before deploying to prod)
  # -------------------------------------------------------------------
  check-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/api
      - name: Lint
        run: python -m ruff check .
        working-directory: apps/api
      - name: Type check
        run: python -m mypy .
        working-directory: apps/api
      - name: Test
        run: python -m pytest
        working-directory: apps/api

  check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: apps/web
      - name: Lint
        run: npm run lint
        working-directory: apps/web
      - name: Type check
        run: npm run typecheck
        working-directory: apps/web
      - name: Build
        run: npm run build
        working-directory: apps/web

  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/gcp/terraform
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/prod"
        working-directory: infra/gcp/terraform
      - name: Terraform validate
        run: terraform validate
        working-directory: infra/gcp/terraform
      - name: Terraform plan
        run: terraform plan -var-file=envs/prod.tfvars -no-color
        working-directory: infra/gcp/terraform

  # -------------------------------------------------------------------
  # Build and push Docker images (after CI passes)
  # -------------------------------------------------------------------
  build-push:
    needs: [check-api, check-web, terraform-plan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, orchestrator, rule-service]
        include:
          - service: api
            context: apps/api
          - service: web
            context: apps/web
          - service: orchestrator
            context: apps/orchestrator
          - service: rule-service
            context: apps/rule-service
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.GAR_REPO }}/${{ matrix.service }}:${{ env.DEPLOY_SHA }}
            ${{ env.GAR_REPO }}/${{ matrix.service }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # Deploy to production (requires manual approval via GitHub Environment)
  # -------------------------------------------------------------------
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/prod"
        working-directory: infra/gcp/terraform
      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var-file=envs/prod.tfvars \
            -var="api_image=${{ env.GAR_REPO }}/api:${{ env.DEPLOY_SHA }}" \
            -var="web_image=${{ env.GAR_REPO }}/web:${{ env.DEPLOY_SHA }}" \
            -var="orchestrator_image=${{ env.GAR_REPO }}/orchestrator:${{ env.DEPLOY_SHA }}" \
            -var="rule_service_image=${{ env.GAR_REPO }}/rule-service:${{ env.DEPLOY_SHA }}"
        working-directory: infra/gcp/terraform
