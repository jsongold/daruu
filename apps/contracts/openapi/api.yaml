openapi: 3.1.0
info:
  title: Daru PDF API
  description: |
    Public API Gateway for Daru PDF document processing service.

    This API provides endpoints for document upload, job management,
    field extraction, and PDF output generation.
  version: 0.1.0
  contact:
    name: Daru PDF Team
  license:
    name: MIT

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.daru-pdf.io/v1
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints (optional for MVP)
  - name: Documents
    description: Document upload and retrieval
  - name: Jobs
    description: Job management and execution
  - name: Review
    description: Review, activity, and evidence retrieval
  - name: Output
    description: Output file generation

paths:
  # Auth endpoints (optional)
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required: [email, password]
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: User logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User info retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Document endpoints
  /documents:
    post:
      tags: [Documents]
      summary: Upload a document
      description: |
        Upload a PDF or image document. The document will be processed
        and metadata will be extracted.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The document file to upload
                role:
                  type: string
                  enum: [source, target]
                  description: Role of the document in the job
              required: [file, role]
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /documents/{document_id}:
    get:
      tags: [Documents]
      summary: Get document by ID
      operationId: getDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentGetResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{document_id}/pages/{page}/preview:
    get:
      tags: [Documents]
      summary: Get page preview image
      operationId: getPagePreview
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - name: page
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
        - name: format
          in: query
          schema:
            type: string
            enum: [png, jpeg]
            default: png
        - name: width
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 4000
      responses:
        '200':
          description: Page preview image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # Job endpoints
  /jobs:
    post:
      tags: [Jobs]
      summary: Create a new job
      description: |
        Create a new document processing job. The mode determines
        how the job processes documents:
        - transfer: Copy data from source to target document
        - scratch: Fill target document from scratch
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
            examples:
              transfer:
                $ref: '#/components/examples/JobCreateTransfer'
              scratch:
                $ref: '#/components/examples/JobCreateScratch'
      responses:
        '201':
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job context
      description: Returns the complete job context including fields, mappings, extractions, issues, and activities.
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job context retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGetResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/run:
    post:
      tags: [Jobs]
      summary: Run job processing
      description: |
        Execute job processing steps. The run_mode determines execution:
        - step: Execute one step and return
        - until_blocked: Execute until user input is needed
        - until_done: Execute until completion or failure
      operationId: runJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRunRequest'
      responses:
        '200':
          description: Job execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRunResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /jobs/{job_id}/answers:
    post:
      tags: [Jobs]
      summary: Provide answers to questions
      description: Submit answers for fields that require user input when job is blocked.
      operationId: submitAnswers
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobAnswersRequest'
      responses:
        '200':
          description: Answers submitted, updated job context returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/edits:
    post:
      tags: [Jobs]
      summary: Submit manual edits
      description: Apply manual edits to field values, positions, or rendering parameters.
      operationId: submitEdits
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobEditsRequest'
      responses:
        '200':
          description: Edits applied, updated job context returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobGetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/review:
    get:
      tags: [Review]
      summary: Get review data
      description: Returns issues, fields, confidence summary, and preview URLs for review.
      operationId: getJobReview
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Review data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobReviewResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/activity:
    get:
      tags: [Review]
      summary: Get activity log
      description: Returns the activity log for a job.
      operationId: getJobActivity
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Activity log retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobActivityResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/evidence:
    get:
      tags: [Review]
      summary: Get evidence for a field
      description: Returns supporting evidence for extractions, optionally filtered by field.
      operationId: getJobEvidence
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: field_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter evidence by field ID
      responses:
        '200':
          description: Evidence retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEvidenceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/output.pdf:
    get:
      tags: [Output]
      summary: Download output PDF
      description: Download the completed PDF with filled fields.
      operationId: downloadOutputPdf
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Job not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{job_id}/export.json:
    get:
      tags: [Output]
      summary: Export job data as JSON
      description: Export all job data including fields, mappings, extractions, evidence, and activity.
      operationId: exportJobJson
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: JSON export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExportResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # SSE endpoint for real-time updates
  /jobs/{job_id}/events:
    get:
      tags: [Jobs]
      summary: Subscribe to job events (SSE)
      description: |
        Server-Sent Events stream for real-time job updates.
        Events include progress updates, activity additions, and status changes.
      operationId: subscribeJobEvents
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique document identifier

    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique job identifier

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request body
              details:
                field: mode
                issue: must be one of [transfer, scratch]

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found

    Conflict:
      description: Conflict - state conflict (e.g., concurrent edit)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: CONFLICT
              message: Job is already running

    UnprocessableEntity:
      description: Unprocessable entity (e.g., password-protected PDF)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNPROCESSABLE
              message: Cannot process password-protected PDF

  schemas:
    # Common schemas
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required: [success]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
            trace_id:
              type: string
          required: [code, message]
      required: [success, error]

    # Auth schemas
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          properties:
            token:
              type: string
            expires_at:
              type: string
              format: date-time
          required: [token, expires_at]
      required: [success, data]

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            name:
              type: string
          required: [id, email]
      required: [success, data]

    # Document schemas
    DocumentMeta:
      type: object
      properties:
        page_count:
          type: integer
          minimum: 1
        size_bytes:
          type: integer
          minimum: 0
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time
        filename:
          type: string
        checksum:
          type: string
      required: [page_count, size_bytes, mime_type, created_at]

    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ref:
          type: string
        meta:
          $ref: '#/components/schemas/DocumentMeta'
      required: [id, ref, meta]

    DocumentUploadResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/Document'
      required: [success, data]

    DocumentGetResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/Document'
      required: [success, data]

    # Field schemas
    BBox:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        x:
          type: number
          minimum: 0
        y:
          type: number
          minimum: 0
        width:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0
      required: [page, x, y, width, height]

    Field:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [text, number, date, checkbox, signature, image]
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        bbox:
          oneOf:
            - $ref: '#/components/schemas/BBox'
            - type: 'null'
        source:
          type: string
          enum: [extracted, manual, default]
        document_id:
          type: string
          format: uuid
        label:
          type: string
        required:
          type: boolean
      required: [id, name, type]

    # Mapping schemas
    Mapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_field_id:
          type: string
          format: uuid
        target_field_id:
          type: string
          format: uuid
        confidence:
          type: number
          minimum: 0
          maximum: 1
        status:
          type: string
          enum: [pending, confirmed, rejected, applied]
        transform:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, source_field_id, target_field_id, confidence]

    # Extraction schemas
    Extraction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        evidence_refs:
          type: array
          items:
            type: object
            properties:
              evidence_id:
                type: string
                format: uuid
              relevance:
                type: number
                minimum: 0
                maximum: 1
            required: [evidence_id]
        status:
          type: string
          enum: [pending, extracted, confirmed, rejected]
        method:
          type: string
          enum: [ocr, llm, rule, manual]
        created_at:
          type: string
          format: date-time
      required: [id, field_id, value, confidence]

    # Evidence schemas
    Evidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [ocr, llm, form_field, annotation, manual]
        bbox:
          oneOf:
            - $ref: '#/components/schemas/BBox'
            - type: 'null'
        text:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
      required: [id, document_id, source, confidence]

    # Activity schemas
    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        action:
          type: string
          enum:
            - job_created
            - job_started
            - job_completed
            - job_failed
            - job_blocked
            - document_uploaded
            - document_processed
            - field_extracted
            - field_mapped
            - field_edited
            - field_confirmed
            - value_applied
            - question_asked
            - answer_provided
            - issue_detected
            - issue_resolved
            - review_started
            - output_generated
        actor:
          type: string
          enum: [system, user, llm, ocr]
        details:
          type: object
        field_id:
          type: string
          format: uuid
        message:
          type: string
      required: [id, job_id, timestamp, action, actor]

    # Issue schemas
    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - missing_value
            - low_confidence
            - format_error
            - validation_error
            - conflict
            - ambiguous_mapping
            - unreadable_content
            - password_protected
            - unsupported_format
        severity:
          type: string
          enum: [error, warning, info]
        message:
          type: string
        status:
          type: string
          enum: [open, resolved, ignored]
        suggestion:
          type: string
        details:
          type: object
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
      required: [id, job_id, type, severity, message]

    # Job schemas
    ConfidenceSummary:
      type: object
      properties:
        average:
          type: number
          minimum: 0
          maximum: 1
        min:
          type: number
          minimum: 0
          maximum: 1
        max:
          type: number
          minimum: 0
          maximum: 1
        low_confidence_count:
          type: integer
          minimum: 0
        total_fields:
          type: integer
          minimum: 0
      required: [average, total_fields]

    JobConfig:
      type: object
      properties:
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.8
        auto_apply:
          type: boolean
          default: false
        require_review:
          type: boolean
          default: true

    NextAction:
      type: object
      properties:
        type:
          type: string
          enum: [provide_answer, review_field, confirm_mapping, resolve_issue]
        field_id:
          type: string
          format: uuid
        issue_id:
          type: string
          format: uuid
        question:
          type: string
        options:
          type: array
          items:
            type: string
      required: [type]

    JobContext:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, blocked, done, failed]
        mode:
          type: string
          enum: [transfer, scratch]
        source_document_id:
          type: string
          format: uuid
        target_document_id:
          type: string
          format: uuid
        config:
          $ref: '#/components/schemas/JobConfig'
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/Mapping'
        extractions:
          type: array
          items:
            $ref: '#/components/schemas/Extraction'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        confidence_summary:
          $ref: '#/components/schemas/ConfidenceSummary'
        next_actions:
          type: array
          items:
            $ref: '#/components/schemas/NextAction'
        progress:
          type: object
          properties:
            current_step:
              type: string
            total_steps:
              type: integer
              minimum: 0
            completed_steps:
              type: integer
              minimum: 0
            percentage:
              type: number
              minimum: 0
              maximum: 100
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            trace_id:
              type: string
      required: [id, status, mode, target_document_id, created_at, updated_at]

    JobCreateRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [transfer, scratch]
        source_document_id:
          type: string
          format: uuid
        target_document_id:
          type: string
          format: uuid
        config:
          $ref: '#/components/schemas/JobConfig'
      required: [mode, target_document_id]

    JobCreateResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          properties:
            job_id:
              type: string
              format: uuid
          required: [job_id]
      required: [success, data]

    JobGetResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/JobContext'
      required: [success, data]

    JobRunRequest:
      type: object
      properties:
        run_mode:
          type: string
          enum: [step, until_blocked, until_done]
        max_steps:
          type: integer
          minimum: 1
      required: [run_mode]

    JobRunResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          properties:
            status:
              type: string
              enum: [pending, running, blocked, done, failed]
            job_context:
              $ref: '#/components/schemas/JobContext'
            next_actions:
              type: array
              items:
                $ref: '#/components/schemas/NextAction'
          required: [status, job_context]
