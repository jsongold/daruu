# =============================================================================
# Daru PDF Nginx Configuration
# =============================================================================
# Production reverse proxy configuration for Daru PDF services.
#
# Features:
#   - Reverse proxy /api requests to FastAPI backend
#   - Serve React static files
#   - WebSocket support for SSE
#   - Gzip compression
#   - Security headers
#   - Rate limiting
#
# Usage:
#   This file is copied into the web container at build time.
#   For local nginx testing: nginx -t -c /path/to/nginx.conf
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ==========================================================================
    # Logging
    # ==========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ==========================================================================
    # Performance
    # ==========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ==========================================================================
    # Gzip Compression
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ==========================================================================
    # Rate Limiting
    # ==========================================================================
    # Limit requests per IP to prevent abuse
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=1r/s;

    # ==========================================================================
    # Upstream Servers
    # ==========================================================================
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ==========================================================================
    # Server Configuration
    # ==========================================================================
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Hide nginx version
        server_tokens off;

        # Max upload size (match FastAPI settings)
        client_max_body_size 50M;

        # ======================================================================
        # API Routes - Proxy to FastAPI
        # ======================================================================
        location /api/ {
            # Rate limiting for API requests
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Headers for proper proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Connection keep-alive
            proxy_set_header Connection "";

            # Timeouts (match FastAPI timeouts)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ======================================================================
        # SSE (Server-Sent Events) Routes
        # ======================================================================
        location ~ ^/api/v1/jobs/.*/stream$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            # Headers for proper proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific settings
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;

            # Long timeout for SSE connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Disable chunked transfer encoding for SSE
            chunked_transfer_encoding off;
        }

        # ======================================================================
        # Upload Routes - Stricter Rate Limiting
        # ======================================================================
        location ~ ^/api/v1/documents$ {
            # Stricter rate limiting for uploads
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Larger buffer for file uploads
            client_body_buffer_size 10M;
        }

        # ======================================================================
        # Health Check - No Rate Limiting
        # ======================================================================
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ======================================================================
        # Metrics Endpoint - Internal Only
        # ======================================================================
        location /metrics {
            # Only allow internal access
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ======================================================================
        # OpenAPI Documentation
        # ======================================================================
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ======================================================================
        # Static Files - React App
        # ======================================================================
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # React Router - serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;

            # No caching for HTML files (allow React updates)
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ======================================================================
        # Error Pages
        # ======================================================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
