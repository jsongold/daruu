# Daru PDF Docker Compose Configuration
# Production-ready configuration following 12-factor principles
#
# Services:
#   - api: FastAPI backend
#   - web: React frontend (production nginx)
#   - redis: Message broker and result backend
#   - celery-worker: Async task processor
#   - celery-beat: Scheduled task scheduler (optional)
#
# Usage:
#   Development: docker compose -f docker-compose.dev.yml up
#   Production:  docker compose up -d
#
# See README.md for detailed setup instructions.

services:
  # ==========================================================================
  # API Service - FastAPI Backend
  # ==========================================================================
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: daru-api
    restart: unless-stopped
    # Single worker required for in-memory storage to work across requests
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "${DARU_API_PORT:-8000}:8000"
    environment:
      # Application settings
      - DARU_DEBUG=${DARU_DEBUG:-false}
      - DARU_API_PREFIX=${DARU_API_PREFIX:-/api/v1}
      # OpenAI/LLM settings
      - DARU_OPENAI_API_KEY=${DARU_OPENAI_API_KEY}
      - DARU_OPENAI_MODEL=${DARU_OPENAI_MODEL:-gpt-4o-mini}
      - DARU_OPENAI_BASE_URL=${DARU_OPENAI_BASE_URL:-}
      - DARU_OPENAI_TIMEOUT_SECONDS=${DARU_OPENAI_TIMEOUT_SECONDS:-120}
      # Supabase settings (secret key for backend operations)
      - DARU_SUPABASE_URL=${DARU_SUPABASE_URL:-}
      - DARU_SUPABASE_SECRET_KEY=${DARU_SUPABASE_SECRET_KEY:-}
      # Processing strategy
      - DARU_PROCESSING_STRATEGY=${DARU_PROCESSING_STRATEGY:-hybrid}
      # Celery settings
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      # Storage paths
      - DARU_UPLOAD_DIR=/app/uploads
      # Cost tracking
      - DARU_COST_MAX_PER_JOB=${DARU_COST_MAX_PER_JOB:-}
      - DARU_COST_WARN_THRESHOLD=${DARU_COST_WARN_THRESHOLD:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - daru-network
    labels:
      - "com.daru-pdf.service=api"
      - "com.daru-pdf.description=FastAPI backend service"

  # ==========================================================================
  # Orchestrator Service - Pipeline Orchestration API
  # ==========================================================================
  orchestrator:
    build:
      context: ../../apps/orchestrator
      dockerfile: Dockerfile
    container_name: daru-pdf-orchestrator
    restart: unless-stopped
    ports:
      - "${DARU_ORCHESTRATOR_PORT:-8001}:8001"
    environment:
      - ORCHESTRATOR_APP_NAME=Daru PDF Orchestrator
      - ORCHESTRATOR_DEBUG=${DARU_ORCHESTRATOR_DEBUG:-false}
      # Service endpoints (talk to API container)
      - ORCHESTRATOR_INGEST_SERVICE_URL=http://api:8000
      - ORCHESTRATOR_STRUCTURE_SERVICE_URL=http://api:8000
      - ORCHESTRATOR_EXTRACTION_SERVICE_URL=http://api:8000
      - ORCHESTRATOR_FILL_SERVICE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - daru-network
    labels:
      - "com.daru-pdf.service=orchestrator"
      - "com.daru-pdf.description=Pipeline orchestration service"

  # ==========================================================================
  # Web Service - React Frontend (Production)
  # ==========================================================================
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
    container_name: daru-web
    restart: unless-stopped
    ports:
      - "${DARU_WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - daru-network
    labels:
      - "com.daru-pdf.service=web"
      - "com.daru-pdf.description=React frontend service"

  # ==========================================================================
  # Redis Service - Message Broker and Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: daru-redis
    restart: unless-stopped
    ports:
      - "${DARU_REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - daru-network
    labels:
      - "com.daru-pdf.service=redis"
      - "com.daru-pdf.description=Redis message broker and cache"

  # ==========================================================================
  # Celery Worker - Async Task Processing
  # ==========================================================================
  celery-worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: daru-celery-worker
    restart: unless-stopped
    command: celery -A app.infrastructure.celery worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    environment:
      # Application settings (same as api)
      - DARU_DEBUG=${DARU_DEBUG:-false}
      - DARU_API_PREFIX=${DARU_API_PREFIX:-/api/v1}
      # OpenAI/LLM settings
      - DARU_OPENAI_API_KEY=${DARU_OPENAI_API_KEY}
      - DARU_OPENAI_MODEL=${DARU_OPENAI_MODEL:-gpt-4o-mini}
      - DARU_OPENAI_BASE_URL=${DARU_OPENAI_BASE_URL:-}
      - DARU_OPENAI_TIMEOUT_SECONDS=${DARU_OPENAI_TIMEOUT_SECONDS:-120}
      # Supabase settings (secret key for backend operations)
      - DARU_SUPABASE_URL=${DARU_SUPABASE_URL:-}
      - DARU_SUPABASE_SECRET_KEY=${DARU_SUPABASE_SECRET_KEY:-}
      # Processing strategy
      - DARU_PROCESSING_STRATEGY=${DARU_PROCESSING_STRATEGY:-hybrid}
      # Celery settings
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - DARU_CELERY_TASK_SOFT_TIME_LIMIT=${DARU_CELERY_TASK_SOFT_TIME_LIMIT:-300}
      - DARU_CELERY_TASK_TIME_LIMIT=${DARU_CELERY_TASK_TIME_LIMIT:-600}
      # Storage paths
      - DARU_UPLOAD_DIR=/app/uploads
      # Cost tracking
      - DARU_COST_MAX_PER_JOB=${DARU_COST_MAX_PER_JOB:-}
      - DARU_COST_WARN_THRESHOLD=${DARU_COST_WARN_THRESHOLD:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.infrastructure.celery inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - daru-network
    labels:
      - "com.daru-pdf.service=celery-worker"
      - "com.daru-pdf.description=Celery async task worker"

  # ==========================================================================
  # Celery Beat - Scheduled Task Scheduler (Optional)
  # ==========================================================================
  celery-beat:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: daru-celery-beat
    restart: unless-stopped
    command: celery -A app.infrastructure.celery beat --loglevel=info
    environment:
      # Celery settings
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - daru-network
    profiles:
      - scheduled # Only starts with: docker compose --profile scheduled up
    labels:
      - "com.daru-pdf.service=celery-beat"
      - "com.daru-pdf.description=Celery scheduled task scheduler"

  # ==========================================================================
  # Dozzle - Real-time Docker Log Viewer
  # ==========================================================================
  dozzle:
    image: amir20/dozzle:latest
    container_name: daru-dozzle
    restart: unless-stopped
    ports:
      - "${DARU_DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
      - DOZZLE_FILTER=name=daru-*
    networks:
      - daru-network
    profiles:
      - tools  # Only starts with: docker compose --profile tools up
    labels:
      - "com.daru-pdf.service=dozzle"
      - "com.daru-pdf.description=Real-time Docker log viewer"

# ==========================================================================
# Networks
# ==========================================================================
networks:
  daru-network:
    driver: bridge
    name: daru-network
    labels:
      - "com.daru-pdf.network=main"

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  redis-data:
    name: daru-redis-data
    labels:
      - "com.daru-pdf.volume=redis-data"
      - "com.daru-pdf.description=Redis persistence data"
  uploads:
    name: daru-uploads
    labels:
      - "com.daru-pdf.volume=uploads"
      - "com.daru-pdf.description=Shared upload directory for API and Celery"
