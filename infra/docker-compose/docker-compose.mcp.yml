# MCP Server Configuration
#
# The MCP server uses stdio transport for Claude Desktop integration.
# It's NOT a long-running HTTP service - it's invoked per-request.
#
# Usage for testing:
#   docker compose -f docker-compose.dev.yml -f docker-compose.mcp.yml run --rm -i mcp
#
# For Claude Desktop, configure in claude_desktop_config.json:
#   "mcpServers": {
#     "daru-pdf": {
#       "command": "docker",
#       "args": ["compose", "-f", "path/to/docker-compose.dev.yml",
#                "-f", "path/to/docker-compose.mcp.yml", "run", "--rm", "-i", "mcp"]
#     }
#   }

services:
  # ==========================================================================
  # MCP Service - Model Context Protocol Server for Claude (stdio)
  # ==========================================================================
  mcp:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.dev
    container_name: daru-mcp
    # No restart - stdio servers run once per invocation
    restart: "no"
    # Use stdin/stdout for MCP protocol
    stdin_open: true
    tty: false
    command: python -m app.mcp.server
    environment:
      # Application settings
      - DARU_DEBUG=true
      - PYTHONUNBUFFERED=1

      # Redis (for session storage) - use localhost since we're on host network
      - REDIS_URL=redis://redis:6379/2

      # Storage
      - DARU_UPLOAD_DIR=/app/uploads

    volumes:
      # Mount source code for development
      - ../../apps/api/app:/app/app:cached
      - uploads:/app/uploads

    depends_on:
      redis:
        condition: service_healthy

    # No healthcheck for stdio servers

    networks:
      - daru-network

    labels:
      - "com.daru-pdf.service=mcp"
      - "com.daru-pdf.env=development"

volumes:
  uploads:
    name: daru-uploads

networks:
  daru-network:
    name: daru-network
