# Cloud Build configuration for Daru PDF API Service
#
# This configuration:
# 1. Builds the Docker image
# 2. Pushes to Artifact Registry
# 3. Deploys to Cloud Run
#
# Trigger this build:
#   gcloud builds submit --config=infra/gcp/cloud-run/api/cloudbuild.yaml .
#
# Or set up a trigger for automatic builds on push to main branch.

substitutions:
  _REGION: asia-northeast1
  _SERVICE_NAME: daru-pdf-api
  _ENVIRONMENT: dev

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api:latest'
      - '-f'
      - 'infra/gcp/cloud-run/api/Dockerfile'
      - '.'
    timeout: 600s

  # Step 2: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api'
    waitFor: ['build']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}-${_ENVIRONMENT}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--cpu'
      - '2'
      - '--memory'
      - '4Gi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300s'
      - '--set-env-vars'
      - 'DARU_API_PREFIX=/api/v1,DARU_DEBUG=true'
    waitFor: ['push']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/daru-pdf/api:latest'

timeout: 1200s
